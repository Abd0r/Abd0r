<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 89 103" shape-rendering="crispEdges"><clipPath id="qaclip"><rect x="0" y="0" width="64" height="64" rx="8"/></clipPath><rect x="5" y="5" width="84" height="84" rx="16" fill="#00000022"/><polygon points="19,87 35,87 26,101" fill="#00000022"/><polygon points="14,82 30,82 21,96" fill="#FFFFFF" stroke="#15803D" stroke-width="4" stroke-linejoin="round"/><rect x="0" y="0" width="84" height="84" rx="16" fill="#FFFFFF" stroke="#15803D" stroke-width="4"/><rect x="18" y="80" width="8" height="8" fill="#FFFFFF"/><g transform="translate(10,10)" clip-path="url(#qaclip)">
  <!-- pixel ring (compass) -->
  <g fill="#15803D">
    <rect x="28" y="8"  width="8" height="8"/>
    <rect x="28" y="48" width="8" height="8"/>
    <rect x="8"  y="28" width="8" height="8"/>
    <rect x="48" y="28" width="8" height="8"/>
    <rect x="16" y="16" width="8" height="8"/>
    <rect x="40" y="16" width="8" height="8"/>
    <rect x="16" y="40" width="8" height="8"/>
    <rect x="40" y="40" width="8" height="8"/>
  </g>

  <!-- center core -->
  <rect x="28" y="28" width="8" height="8" fill="#39FF14"/>

  <!-- radar sweep needle -->
  <g>
    <rect x="30" y="4" width="4" height="24" fill="#39FF14">
      <animate attributeName="opacity" values="1;0.4;1" dur="1.6s" repeatCount="indefinite"/>
    </rect>
    <animateTransform attributeName="transform" type="rotate"
      values="0 32 32;90 32 32;180 32 32;270 32 32;360 32 32"
      keyTimes="0;0.25;0.5;0.75;1"
      calcMode="discrete"
      dur="3.2s" repeatCount="indefinite"/>
  </g>
</g></svg>
