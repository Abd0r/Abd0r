<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <rect width="64" height="64" fill="#0B0800"/>

  <!-- gauge track -->
  <g fill="#FFB000" opacity="0.4">
    <rect x="8"  y="46" width="6" height="10"/>
    <rect x="16" y="46" width="6" height="10"/>
    <rect x="24" y="46" width="6" height="10"/>
    <rect x="32" y="46" width="6" height="10"/>
    <rect x="40" y="46" width="6" height="10"/>
    <rect x="48" y="46" width="6" height="10"/>
  </g>

  <!-- fill bar sweeping (compute routed to hard samples) -->
  <rect x="8" y="46" width="6" height="10" fill="#FF6A00">
    <animate attributeName="x" values="8;16;24;32;40;48;8" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- frozen / mastered block -->
  <rect x="20" y="10" width="24" height="24" fill="none" stroke="#FFB000" stroke-width="3"/>
  <rect x="28" y="18" width="8" height="8" fill="#FF6A00">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </rect>
</svg>
