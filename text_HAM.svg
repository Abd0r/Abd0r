<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 72" shape-rendering="crispEdges">
  <!-- drop shadow -->
  <rect x="5" y="5" width="195" height="67" rx="14" fill="#00000022"/>
  <!-- card -->
  <rect x="0" y="0" width="195" height="67" rx="14" fill="#FFFFFF" stroke="#15803D" stroke-width="4"/>
  <!-- pixel letters H . A . M  (7x7 cells) -->
  <g transform="translate(16,16)" fill="#0F172A">
    <!-- H -->
    <rect x="0" y="0" width="7" height="35"/>
    <rect x="21" y="0" width="7" height="35"/>
    <rect x="7" y="14" width="14" height="7"/>
    <!-- . -->
    <rect x="35" y="28" width="7" height="7" fill="#15803D"/>
    <!-- A -->
    <g transform="translate(49,0)">
      <rect x="7" y="0" width="14" height="7"/>
      <rect x="0" y="7" width="7" height="28"/>
      <rect x="21" y="7" width="7" height="28"/>
      <rect x="7" y="14" width="14" height="7"/>
    </g>
    <!-- . -->
    <rect x="84" y="28" width="7" height="7" fill="#15803D"/>
    <!-- M -->
    <g transform="translate(98,0)">
      <rect x="0" y="0" width="7" height="35"/>
      <rect x="28" y="0" width="7" height="35"/>
      <rect x="7" y="7" width="7" height="7"/>
      <rect x="14" y="14" width="7" height="7"/>
      <rect x="21" y="7" width="7" height="7"/>
    </g>
    <!-- status blip -->
    <rect x="147" y="0" width="7" height="7" fill="#0EA5E9">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.4s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
