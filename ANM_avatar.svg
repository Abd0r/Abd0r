<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- mesh nodes -->
  <g stroke="#FFB000" stroke-width="2" opacity="0.7">
    <line x1="14" y1="14" x2="32" y2="32"/>
    <line x1="50" y1="14" x2="32" y2="32"/>
    <line x1="14" y1="50" x2="32" y2="32"/>
    <line x1="50" y1="50" x2="32" y2="32"/>
    <line x1="32" y1="8"  x2="32" y2="32"/>
  </g>

  <rect x="10"  y="10" width="8" height="8" fill="#FFB000"/>
  <rect x="46"  y="10" width="8" height="8" fill="#FFB000"/>
  <rect x="10"  y="46" width="8" height="8" fill="#FFB000"/>
  <rect x="46"  y="46" width="8" height="8" fill="#FFB000"/>
  <rect x="28"  y="4"  width="8" height="8" fill="#FFB000"/>

  <!-- active expert node cycles -->
  <rect x="10" y="10" width="8" height="8" fill="#FF6A00">
    <animate attributeName="x" values="10;46;46;10;28;10" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="y" values="10;10;46;46;4;10" dur="4s" repeatCount="indefinite"/>
  </rect>

  <rect x="28" y="28" width="8" height="8" fill="#FF6A00"/>
</svg>
