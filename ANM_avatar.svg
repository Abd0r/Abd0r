<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 89 103" shape-rendering="crispEdges"><clipPath id="aaclip"><rect x="0" y="0" width="64" height="64" rx="8"/></clipPath><rect x="5" y="5" width="84" height="84" rx="16" fill="#00000022"/><polygon points="19,87 35,87 26,101" fill="#00000022"/><polygon points="14,82 30,82 21,96" fill="#FFFFFF" stroke="#15803D" stroke-width="4" stroke-linejoin="round"/><rect x="0" y="0" width="84" height="84" rx="16" fill="#FFFFFF" stroke="#15803D" stroke-width="4"/><rect x="18" y="80" width="8" height="8" fill="#FFFFFF"/><g transform="translate(10,10)" clip-path="url(#aaclip)">
  <!-- mesh nodes -->
  <g stroke="#15803D" stroke-width="2" opacity="0.7">
    <line x1="14" y1="14" x2="32" y2="32"/>
    <line x1="50" y1="14" x2="32" y2="32"/>
    <line x1="14" y1="50" x2="32" y2="32"/>
    <line x1="50" y1="50" x2="32" y2="32"/>
    <line x1="32" y1="8"  x2="32" y2="32"/>
  </g>

  <rect x="10"  y="10" width="8" height="8" fill="#15803D"/>
  <rect x="46"  y="10" width="8" height="8" fill="#15803D"/>
  <rect x="10"  y="46" width="8" height="8" fill="#15803D"/>
  <rect x="46"  y="46" width="8" height="8" fill="#15803D"/>
  <rect x="28"  y="4"  width="8" height="8" fill="#15803D"/>

  <!-- active expert node cycles -->
  <rect x="10" y="10" width="8" height="8" fill="#39FF14">
    <animate attributeName="x" values="10;46;46;10;28;10" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="y" values="10;10;46;46;4;10" dur="4s" repeatCount="indefinite"/>
  </rect>

  <rect x="28" y="28" width="8" height="8" fill="#39FF14"/>
</g></svg>
